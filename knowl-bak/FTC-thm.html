<article class="theorem theorem-like"><h3 class="heading">
<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">2.55</span><span class="period">.</span><span class="space"> </span><span class="title">The Fundamental Theorem of Calculus.</span>
</h3>
<div class="para logical">
<div class="para">Suppose that <span class="process-math">\(\dfdx{A{{x}=y\)</span> (so that <span class="process-math">\(A\)</span> is an antiderivative of <span class="process-math">\(y\)</span>). Then</div>
<div class="displaymath process-math">
\begin{equation*}
\int_{x=a}^b y\dx{x}{}=A(b)-A(a).
\end{equation*}
</div>
