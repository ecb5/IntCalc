</h3>
<div class="para logical">
<div class="para">Analogously, show that the <dfn class="terminology">unit hyperbola</dfn>, <span class="process-math">\(x^2-y^2=1\)</span> is parameterized by</div>
<div class="displaymath process-math">
\begin{equation*}
P(t)=
\begin{Bmatrix}
\cosh(t)\\
\sinh(t)\\
{-\infty\lt t\lt \infty}
\end{Bmatrix}.
\end{equation*}
</div>
<div class="para">That is, show that <span class="process-math">\(x^2-y^2=\cosh^2(t)-\sinh^2(t)=1\text{.}\)</span>
</div>
