<article class="definition definition-like"><h4 class="heading">
<span class="type">Definition</span><span class="space"> </span><span class="codenumber">17.1.2.1</span><span class="period">.</span><span class="space"> </span><span class="title">Antiderivative.</span>
</h4>
<div class="para logical">
<div class="para">Suppose we have a function</div>
<div class="displaymath process-math">
\begin{equation}
y=F(t)\tag{17.3}
\end{equation}
</div>
<div class="para">with derivative <span class="process-math">\(\dfdx{y}{t}=F^\prime(t)=f(t)\text{.}\)</span> Then <span class="process-math">\(F(t)\)</span> is called an <dfn class="terminology">antiderivative</dfn> of <span class="process-math">\(f(t)\text{.}\)</span>
</div>
</div></article><span class="incontext"><a class="internal" href="SECTIONThinkingAboutIntegration.html#DEFINITIONAntiderivative">in-context</a></span>
