<div class="para"> Again,  the point is that integration  gives us a more systematic way of solving differential equations. The solution strategy we used when we rewrote <a href="" class="xref" data-knowl="./knowl/xref/EQUATIONSpinCastDiffeq.html" title="Equation 18.2">equation (18.2)</a> is called <dfn class="terminology">separation of variables</dfn> and it will enable us to solve a great many simple differential equations.</div>
