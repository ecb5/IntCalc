\int\tan(x)\dx{x} = \int\frac{\sin(x)}{\cos(x)}\dx{x}\amp=\int\frac{\sin(x)}{z}\cdot\frac{-\dx{z}}{\sin(x)}\\
\amp=-\int\frac{\dx{z}}{z}\\
\amp=-\ln(z)+c\\
\amp=(-1)\ln(\cos(x))+c\\
\amp=\ln\left((\cos(x))^{-1}\right)+c\\
\amp=\ln\left(\sec(x)\right)+c
\end{align*}
