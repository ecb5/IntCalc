<div class="para">For example notice that if <span class="process-math">\(a\)</span> and <span class="process-math">\(b\)</span> are constants then <span class="process-math">\(x+a\)</span> and <span class="process-math">\(x-b\)</span> have no common factors. Since <span class="process-math">\((x+a)-(x+b)=a-b\)</span> it follows  that</div>
<div class="displaymath process-math">
\begin{equation*}
\frac{1}{a-b}(x+a)+\frac{-1}{a-b}(x+b)=1\text{.}
\end{equation*}
