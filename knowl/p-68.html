<div class="para">Another approach would be to let  <span class="process-math">\(u=\tan(x)\)</span> so that <span class="process-math">\(\text{,}\)</span> and <span class="process-math">\(\dx{u}=\sec^2(x)\dx{x}\text{.}\)</span> In that case we have</div>
<div class="displaymath process-math">
\begin{equation}
\int\tan(x)\dx{x}=\int\frac{u}{\sec^2(x)}\dx{u}=\int\frac{u}{1+\tan^2(x)}\dx{u}=\int\frac{u}{1+u^2}\dx{u}.\tag{2.1}
\end{equation}
