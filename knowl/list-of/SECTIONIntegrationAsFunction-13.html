<article class="corollary theorem-like"><h3 class="heading">
<span class="type">Corollary</span><span class="space"> </span><span class="codenumber">8.2.0.4</span><span class="period">.</span><span class="space"> </span><span class="title">Definite Integration.</span>
</h3>
<div class="para logical">
<div class="para">Let <span class="process-math">\(c\)</span> and <span class="process-math">\(b\)</span> be constants.  Then from <a href="SECTIONIntegrationAsFunction.html#THEOREMFTC" class="xref" data-knowl="./knowl/xref/THEOREMFTC.html" data-reveal-label="Reveal" data-close-label="Close" title="Theorem 8.2.0.2: The Fundamental Theorem of Calculus (FTC)">Theorem 8.2.0.2</a> and <a href="SECTIONIntegrationAsFunction.html#EQUATIONFTC5" class="xref" data-knowl="./knowl/xref/EQUATIONFTC5.html" data-reveal-label="Reveal" data-close-label="Close" title="Equation 8.4">(8.4)</a> it follows that</div>
<div class="displaymath process-math" data-contains-math-knowls="./knowl/xref/THEOREMFTC.html ./knowl/xref/EQUATIONFTC5.html">
\begin{equation}
\int_{t=c}^{b} f(t)\dx{t} = F(c)-F(b).\tag{8.6}
\end{equation}
</div>
