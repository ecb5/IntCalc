<div class="para">Use Taylor’s formula to obtain Newton’s binomial series</div>
<div class="displaymath process-math">
\begin{equation*}
{\left(1+x\right)}^{\alpha }=1+\sum^{\infty }_{n=1}{\frac{\alpha \left(\alpha -1\right)\dots \left(\alpha -\left(n-1\right)\right)}{n!} x^n}
\end{equation*}
