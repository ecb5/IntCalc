<div class="para">Using the Half-Angle formula again we obtain</div>
<div class="displaymath process-math">
\begin{equation*}
\frac{1}{4}\int\sin^2(2\theta)\dx{\theta} =
\frac18\int(1-\cos(4\theta))\dx{\theta} =
\frac18\left(\theta-\frac14\sin(4\theta)\right)+c
\end{equation*}
