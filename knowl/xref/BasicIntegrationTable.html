<figure class="table table-like"><figcaption><span class="type">Table</span><span class="space"> </span><span class="codenumber">1.6<span class="period">.</span></span><span class="space"> </span>Integration Rules Inherited from Differentiation Rules</figcaption><div class="tabular-box natural-width"><table class="tabular">
<tr class="header-horizontal">
<th scope="col" class="c m b3 r0 l0 t0 lines">Differentiation Rule</th>
<th scope="col" class="c m b3 r0 l0 t0 lines">Integration Rule<br>(Assume <span class="process-math">\(a\)</span> and <span class="process-math">\(c\)</span> are constants.)</th>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(\text{constant})=0\)</span></td>
<td class="c m b0 r0 l0 t0 lines">
<span class="process-math">\(\int0\dx{x}=c,\)</span><br>where <span class="process-math">\(c\)</span> is a constant.</td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(f+g)=\dx{f}+\dx{g}\)</span></td>
<td class="c m b0 r0 l0 t0 lines">
<span class="process-math">\(\int\dx(f+g)=\int\dx{f}+\int\dx{g}\)</span><br><span class="process-math">\(=f+g+c\)</span>
</td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines">If <span class="process-math">\(a\)</span> is a constant, then<br><span class="process-math">\(\dx(ay)=a\dx(y)\)</span>
</td>
<td class="c m b0 r0 l0 t0 lines">
<span class="process-math">\(\int a\dx{y}=\int\dx(ay)=a\int\dx{y}\)</span><br><span class="process-math">\(=ay+c\)</span>
</td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(x^{n+1})=(n+1)x^n\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int x^n\dx{x} = \frac{x^{n+1}}{n+1}+c, n\neq
-1\)</span></td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(\ln(x))=\frac1x\dx{x}=x^{-1}\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int x^{-1}\dx{x} = \ln\abs{x}+c\)</span></td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(e^x)= e^x\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int e^x\dx{x} = e^x+c\)</span></td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(\sin(x))=\cos(x)\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int \cos(x) = \sin(x) +c\)</span></td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(\cos(x))=-\sin(x)\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int \sin(x)\dx{x} = -\cos(x) +c\)</span></td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(\tan(x))=\sec^2(x)\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int\sec^2(x)\dx{x} = \tan(x)+c\)</span></td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(\sec(x))= \sec(x)\tan(x)\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int\sec(x)\tan(x)=\sec(x)+c\)</span></td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(\inverse\sin(x))=
\frac{1}{\sqrt{1-x^2}}\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int\frac{1}{\sqrt{1-x^2}}\dx{x}=\inverse\sin(x)+c\)</span></td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(\inverse\tan(x))=
\frac{1}{1+x^2}\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int\frac{1}{1+x^2}\dx{x}=\inverse\tan(x)+c\)</span></td>
</tr>
<tr>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\dx(\inverse\sec(x))=
\frac{1}{x\sqrt{x^2-1}}\dx{x}\)</span></td>
<td class="c m b0 r0 l0 t0 lines"><span class="process-math">\(\int\frac{1}{x\sqrt{x^2-1}}\dx{x}=\inverse\sec(x)+c\)</span></td>
</tr>
