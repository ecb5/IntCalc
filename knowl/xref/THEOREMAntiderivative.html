<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">18.1.2.1</span><span class="period">.</span><span class="space"> </span><span class="title">Antiderivative.</span>
</h4>
<div class="para logical">
<div class="para">Suppose we have a function</div>
<div class="displaymath process-math">
\begin{equation}
y=F(t)\tag{18.3}
\end{equation}
</div>
<div class="para">with derivative <span class="process-math">\(\dfdx{y}{t}=F^\prime(t)=f(t)\text{.}\)</span>
</div>
</div> <div class="para">
<span class="process-math">\(F(t)\)</span> is called an <dfn class="terminology">antiderivative</dfn> of <span class="process-math">\(f(t)\text{.}\)</span>
</div></article><span class="incontext"><a class="internal" href="CHAPTERFTC-3.html#THEOREMAntiderivative">in-context</a></span>
