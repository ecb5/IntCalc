<h3 class="heading"><span class="type">Paragraph</span></h3>
<div class="para">There are no wrong substitutions, just unhelpful ones.  For example, when computing <span class="process-math">\(\int\tan(x)\dx{x}\text{,}\)</span> we could have let <span class="process-math">\(z=x\text{.}\)</span> In that case we would have <span class="process-math">\(\int\tan(x)\dx{x}=\int\tan(z)\dx{z}\)</span> which though correct, is not very helpful.</div>
